beats:
  - id: spark
    number: 1
    title: "Sparks"
    body: "Bonheur is the French word for happiness. Its sound evokes bon (good) and heure (hour), inspiring the idea that happiness isn't one grand achievement, but a collection of good moments. Bonheur is a practice of noticing what truly sparks joy, preserving those moments, and letting a meaningful life gradually take shape around them."
    motif: drifting

  - id: ache
    number: 2
    motif: fading

  - id: turn
    number: 3
    motif: caught

  - id: jar
    number: 4
    title: "The Jar"
    body: "Every day gets its own jar. Drop a spark in and it glows — brighter with every good hour you caught that day. Up to three a day; some days the jar stays dim, and that's allowed to just be true."
    motif: none
    media: null

  - id: outro
    number: 5
    title: "Let your Bonheur journey begin…"
    motif: none
