baseURL = 'https://abllll.github.io/Portfolio/'
languageCode = 'en-us'
title = 'Amber Li — Design Engineering'
theme = "hugo-minimal-black"

[outputs]
  home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[outputFormats.WebAppManifest]
  mediaType = "application/manifest+json"
  rel = "manifest"
  baseName = "manifest"
  isPlainText = true
  notAlternative = true

[params]
  brand = "Amber Li"
  description = "Design engineering portfolio of Amber Li — systems thinking across engineering, spatial design, and AI."

  favicon = "icons/favicon.svg"
  appleTouchIcon = "apple-touch-icon.png"

  projectsIntro = "Case studies across product, spatial, and systems work — same process, different medium."

  [params.manifest]
    themeColor = "#A83831"
    backgroundColor = "#F4EFE8"
    categories = ["portfolio", "design"]

  [params.theme]
    defaultTheme = "light"

  [params.home]
    sections = ["hero", "projects", "perspective"]
    showFeaturedProjects = true
    featuredProjectsLimit = 4
    projectsTitle = "Selected Work"
    projectsSubtitle = "A few projects, picked for fit rather than volume."

  [params.hero]
    title = "Amber Li"
    badge = "Design Engineering"
    tagline = "Roots & Branches"
    summary = "a systems-thinking approach to engineering, spatial design, and the tools that connect them."

    [params.hero.primary]
      label = "See the work"
      href = "/work/"

    [params.hero.secondary]
      label = "More about how I think"
      href = "/about/"

  [params.icons]
    useFontAwesome = true
    useDevicon = false

  [[params.social]]
    label = "LinkedIn"
    url = "https://www.linkedin.com/in/REPLACE-WITH-AMBER-LINKEDIN-HANDLE/"
    icon = "fa-brands fa-linkedin-in"

  [[params.social]]
    label = "Email"
    url = "mailto:REPLACE-WITH-AMBER-EMAIL@example.com"
    icon = "fa-regular fa-envelope"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 0
    identifier = "home"

  [[menu.main]]
    name = "Work"
    pageRef = "work"
    url = "/work/"
    weight = 1
    identifier = "work"

  [[menu.main]]
    name = "Experiments"
    pageRef = "experiments"
    url = "/experiments/"
    weight = 2
    identifier = "experiments"

  [[menu.main]]
    name = "About"
    pageRef = "about"
    url = "/about/"
    weight = 3
    identifier = "about"

  [[menu.main]]
    name = "Resume"
    url = "/about/#resume"
    weight = 4
    identifier = "resume"

  [[menu.main]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/REPLACE-WITH-AMBER-LINKEDIN-HANDLE/"
    weight = 5
    identifier = "linkedin-nav"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

  [markup.goldmark.extensions]
    typographer = true
    linkify = true
    table = true
    strikethrough = true
    taskList = true
    definitionList = true
    footnote = true

    [markup.goldmark.extensions.extras.delete]
      enable = true
    [markup.goldmark.extensions.extras.insert]
      enable = true
    [markup.goldmark.extensions.extras.mark]
      enable = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "monokai"
    tabWidth = 2

[taxonomies]
  tag = "tags"
  category = "categories"

[privacy]
  [privacy.youtube]
    privacyEnhanced = true
