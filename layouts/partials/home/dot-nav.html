<nav class="dot-nav" id="dot-nav" aria-label="Section navigation">
  {{ range $index, $section := .Site.Data.home_sections }}
  <a href="#{{ $section.id }}" class="dot-nav__dot" data-dot-target="{{ $section.id }}" data-dot-kind="{{ $section.kind }}" aria-label="{{ $section.label }}">
    <span class="dot-nav__marker" aria-hidden="true"></span>
    <span class="dot-nav__label" aria-hidden="true">{{ printf "%02d" $index }} · {{ $section.label }}</span>
  </a>
  {{ end }}
</nav>
